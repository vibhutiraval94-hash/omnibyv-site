<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni by V | Catalog Manager</title>
    <style>
        :root {
            --bg-color: #FAF9F6; /* Luxury Ivory */
            --primary-navy: #0B1528;
            --accent-gold: #C5A059;
            --border-silver: #E2E8F0;
            --white: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-navy);
        }

        header {
            background-color: var(--primary-navy);
            color: var(--white);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-gold);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border-silver);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        h2 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-silver);
            padding-bottom: 10px;
            color: var(--primary-navy);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-silver);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        button {
            background-color: var(--primary-navy);
            color: var(--white);
            border: 1px solid var(--accent-gold);
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent-gold);
        }

        .product-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-silver);
        }

        .btn-delete {
            background-color: #EF4444;
            border: none;
            width: auto;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .btn-delete:hover {
            background-color: #DC2626;
        }
    </style>
</head>
<body>

    <header>
        <h1>OMNI BY V — MANAGEMENT PORTAL</h1>
        <div>Logged in securely via Cloudflare Access</div>
    </header>

    <div class="container">
        <div class="card">
            <h2>Add New Jewelry Item</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prodName" placeholder="e.g., Golden Hour Drop Hoops" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="prodPrice" placeholder="e.g., $120" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="prodStatus">
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <button type="submit">Publish to Website</button>
            </form>
        </div>

        <div class="card">
            <h2>Active Catalog (<span id="count">0</span> Items)</h2>
            <div id="catalogList">
                <p style="color: var(--border-silver);">No items found. Add your first jewelry piece to get started.</p>
            </div>
        </div>
    </div>

    <script>
        // Form submisson mock handler (ready to link directly to your live database)
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Perfect! This item has been securely updated. The screen will no longer render blank!");
        });
    </script>
</body>
</html>
