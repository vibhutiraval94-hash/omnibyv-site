<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni by V | Under Production</title>
    <style>
        :root {
            --bg-color: #FAF9F6; /* Luxury Ivory */
            --primary-navy: #0B1528;
            --accent-gold: #C5A059;
            --muted-gray: #718096;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--primary-navy);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px 20px;
        }

        .logo-placeholder {
            max-width: 180px;
            height: auto;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 12px;
            color: var(--primary-navy);
        }

        .divider {
            height: 2px;
            width: 60px;
            background-color: var(--accent-gold);
            margin: 20px auto;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--muted-gray);
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background-color: rgba(197, 160, 89, 0.1);
            color: var(--accent-gold);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- If your logo file is in the folder, this will load automatically -->
        <img class="logo-placeholder" src="omnibyv logo.png" alt="Omni by V">
        
        <div class="status-badge">Coming Soon</div>
        <h1>Under Production</h1>
        <div class="divider"></div>
        <p>We are currently polishing our brand-new digital boutique to bring you an exquisite jewelry experience. Thank you for your patience.</p>
    </div>

</body>
</html>
